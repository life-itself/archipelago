<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archipelago Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a5276;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .map-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .island-group {
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  .island-group:hover {
    opacity: 0.85;
  }

  .island-label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    fill: #e8e0d0;
    opacity: 0.85;
    pointer-events: none;
    text-anchor: middle;
  }

  .island-label-bg {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    fill: none;
    stroke: #1a5276;
    stroke-width: 3;
    pointer-events: none;
    text-anchor: middle;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(10, 40, 60, 0.9);
    border: 1px solid rgba(232, 224, 208, 0.3);
    color: #e8e0d0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 100;
    max-width: 250px;
  }

  .tooltip.visible {
    opacity: 1;
  }

  .tooltip .place-name {
    font-weight: 400;
    font-size: 17px;
    margin-bottom: 4px;
  }

  .tooltip .place-location {
    font-style: italic;
    font-weight: 300;
    opacity: 0.7;
  }

  /* Subtle paper grain overlay */
  .grain-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0.06;
    z-index: 50;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
</style>
</head>
<body>

<div class="map-container">
  <svg id="map" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- Base turbulence for organic island edges -->
      <filter id="island-texture" x="-50%" y="-50%" width="200%" height="200%">
        <!-- Create organic distortion -->
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" seed="1" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <!-- Soft edges like cyanotype photogram -->
        <feGaussianBlur in="displaced" stdDeviation="2.5" result="blurred"/>
        <!-- Slight glow -->
        <feGaussianBlur in="displaced" stdDeviation="8" result="glow"/>
        <feMerge>
          <feMergeNode in="glow"/>
          <feMergeNode in="blurred"/>
        </feMerge>
      </filter>

      <!-- Variation filters with different seeds for variety -->
      <filter id="island-texture-2" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="42" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="2" result="blurred"/>
        <feGaussianBlur in="displaced" stdDeviation="6" result="glow"/>
        <feMerge>
          <feMergeNode in="glow"/>
          <feMergeNode in="blurred"/>
        </feMerge>
      </filter>

      <filter id="island-texture-3" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="5" seed="99" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="3" result="blurred"/>
        <feGaussianBlur in="displaced" stdDeviation="10" result="glow"/>
        <feMerge>
          <feMergeNode in="glow"/>
          <feMergeNode in="blurred"/>
        </feMerge>
      </filter>

      <!-- Wispy tendril filter for smaller features -->
      <filter id="island-wispy" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="1.5" result="blurred"/>
        <feGaussianBlur in="displaced" stdDeviation="5" result="glow"/>
        <feMerge>
          <feMergeNode in="glow"/>
          <feMergeNode in="blurred"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Deep blue background with slight gradient for depth -->
    <rect width="1200" height="800" fill="url(#bg-gradient)"/>
    <defs>
      <radialGradient id="bg-gradient" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#1e6390"/>
        <stop offset="100%" stop-color="#14405c"/>
      </radialGradient>
    </defs>

    <!-- Islands will be inserted here by JS -->
    <g id="islands"></g>
  </svg>
</div>

<div class="tooltip" id="tooltip">
  <div class="place-name"></div>
  <div class="place-location"></div>
</div>

<div class="grain-overlay"></div>

<script>
const places = [
  // Rough layout: scattered across the canvas like an island chain
  // Loosely grouped by region but not geographic
  // Format: { id, title, location, country, url, x, y, size, filter, paths }

  // === European cluster (center-left, upper) ===
  { id: "bergerac-praxis-hub", title: "The Bergerac Praxis Hub", location: "France", url: "/places/bergerac-praxis-hub",
    x: 380, y: 180, size: 1.3, filter: "island-texture",
    paths: ["M0,-45 C15,-50 35,-30 40,-15 C45,5 30,20 25,40 C20,55 5,50 -10,45 C-25,40 -35,25 -40,10 C-45,-5 -30,-20 -20,-35 C-10,-45 -5,-48 0,-45"]
  },
  { id: "feytopia", title: "Feÿtopia", location: "France", url: "/places/feytopia",
    x: 310, y: 290, size: 0.7, filter: "island-wispy",
    paths: ["M0,-25 C10,-28 25,-15 20,0 C15,15 5,25 -5,20 C-15,15 -25,5 -20,-10 C-15,-20 -5,-28 0,-25"]
  },
  { id: "liminal-village", title: "Liminal Village", location: "Italy", url: "/places/liminal-village",
    x: 480, y: 260, size: 0.85, filter: "island-texture-2",
    paths: ["M0,-30 C12,-35 30,-20 28,-5 C26,15 15,30 0,28 C-15,25 -28,10 -25,-8 C-22,-22 -10,-32 0,-30"]
  },
  { id: "emerge-lakefront", title: "Emerge Lakefront", location: "Sweden", url: "/places/emerge-lakefront",
    x: 520, y: 120, size: 1.1, filter: "island-texture-3",
    paths: ["M-5,-40 C10,-45 25,-35 30,-20 C35,-5 40,15 30,30 C20,40 5,35 -10,25 C-20,15 -30,5 -28,-10 C-25,-25 -15,-38 -5,-40"]
  },
  { id: "borderland", title: "Borderland", location: "Sweden", url: "/places/borderland",
    x: 570, y: 190, size: 0.6, filter: "island-wispy",
    paths: ["M0,-20 C10,-22 18,-10 15,2 C12,14 3,20 -5,18 C-14,15 -18,5 -15,-8 C-12,-17 -5,-22 0,-20"]
  },
  { id: "realisation-festival", title: "The Realisation Festival", location: "UK", url: "/places/realisation-festival",
    x: 240, y: 160, size: 0.75, filter: "island-texture-2",
    paths: ["M0,-28 C14,-30 25,-15 22,2 C19,18 8,28 -5,25 C-18,22 -25,8 -22,-8 C-18,-22 -8,-30 0,-28"]
  },
  { id: "casa-tilo", title: "Casa Tilo", location: "Spain", url: "/places/casa-tilo",
    x: 270, y: 380, size: 0.9, filter: "island-texture",
    paths: ["M0,-32 C15,-35 28,-18 25,0 C22,18 10,30 -5,28 C-20,25 -30,10 -27,-8 C-24,-22 -10,-35 0,-32"]
  },

  // === Portugal cluster (left, middle) ===
  { id: "traditional-dream-factory", title: "Traditional Dream Factory", location: "Portugal", url: "/places/traditional-dream-factory",
    x: 130, y: 350, size: 0.8, filter: "island-texture-3",
    paths: ["M0,-28 C12,-32 25,-18 22,-2 C19,14 8,26 -3,24 C-16,22 -25,8 -22,-6 C-19,-18 -8,-30 0,-28"]
  },
  { id: "tamera", title: "Tamera", location: "Portugal", url: "/places/tamera",
    x: 90, y: 430, size: 0.55, filter: "island-wispy",
    paths: ["M0,-18 C8,-20 16,-10 14,0 C12,10 4,18 -4,15 C-12,12 -16,4 -14,-6 C-12,-14 -5,-20 0,-18"]
  },
  { id: "fools-valley", title: "Fools Valley", location: "Portugal", url: "/places/fools-valley",
    x: 160, y: 460, size: 0.5, filter: "island-wispy",
    paths: ["M0,-16 C8,-18 14,-8 12,2 C10,12 3,16 -4,14 C-11,12 -15,4 -12,-5 C-10,-13 -5,-18 0,-16"]
  },
  { id: "transformational-connection-hub", title: "Transformational Connection Hub", location: "Portugal", url: "/places/transformational-connection-hub",
    x: 70, y: 510, size: 0.6, filter: "island-texture-2",
    paths: ["M0,-20 C10,-22 20,-12 18,2 C15,14 5,20 -5,18 C-15,14 -20,4 -17,-8 C-14,-17 -6,-22 0,-20"]
  },

  // === Americas cluster (right side) ===
  { id: "monastic-academy", title: "Monastic Academy", location: "Vermont", url: "/places/monastic-academy",
    x: 780, y: 200, size: 1.0, filter: "island-texture",
    paths: ["M-5,-38 C10,-42 28,-28 32,-12 C36,8 25,28 10,35 C-5,38 -20,28 -28,12 C-32,-2 -25,-25 -15,-35 C-10,-40 -5,-42 -5,-38"]
  },
  { id: "sky-meadow-retreat", title: "Sky Meadow Retreat", location: "Vermont", url: "/places/sky-meadow-retreat",
    x: 830, y: 130, size: 0.7, filter: "island-texture-3",
    paths: ["M0,-24 C10,-26 20,-15 18,0 C15,12 5,22 -5,20 C-15,16 -20,5 -18,-8 C-15,-18 -6,-26 0,-24"]
  },
  { id: "possibility-alliance", title: "Possibility Alliance", location: "Maine", url: "/places/possibility-alliance",
    x: 880, y: 240, size: 0.5, filter: "island-wispy",
    paths: ["M0,-16 C8,-18 15,-8 12,3 C9,13 2,16 -5,14 C-12,11 -15,3 -12,-6 C-9,-14 -4,-18 0,-16"]
  },
  { id: "the-alembic", title: "The Alembic", location: "California", url: "/places/the-alembic",
    x: 950, y: 350, size: 0.75, filter: "island-texture-2",
    paths: ["M0,-26 C12,-28 22,-14 20,2 C17,16 6,24 -5,22 C-16,18 -22,6 -20,-8 C-17,-20 -7,-28 0,-26"]
  },
  { id: "burning-man", title: "Burning Man", location: "Nevada", url: "/places/burning-man",
    x: 1010, y: 280, size: 0.6, filter: "island-wispy",
    paths: ["M0,-20 C10,-22 18,-10 15,3 C12,14 3,20 -5,17 C-14,14 -18,4 -15,-7 C-12,-16 -5,-22 0,-20"]
  },

  // === Central/South America cluster (lower right) ===
  { id: "brave-earth", title: "Brave Earth", location: "Costa Rica", url: "/places/brave-earth",
    x: 850, y: 480, size: 0.8, filter: "island-texture",
    paths: ["M0,-28 C12,-30 24,-16 22,0 C19,14 8,26 -4,24 C-16,20 -24,8 -22,-6 C-19,-18 -8,-30 0,-28"]
  },
  { id: "eterna", title: "Eterna", location: "Costa Rica", url: "/places/eterna",
    x: 910, y: 540, size: 0.6, filter: "island-wispy",
    paths: ["M0,-20 C9,-22 18,-12 16,0 C14,12 5,18 -4,16 C-13,13 -18,4 -15,-7 C-12,-16 -5,-22 0,-20"]
  },
  { id: "tierramor", title: "Tierramor", location: "Costa Rica", url: "/places/tierramor",
    x: 790, y: 560, size: 0.5, filter: "island-wispy",
    paths: ["M0,-16 C7,-18 14,-8 12,2 C10,11 3,15 -4,13 C-11,10 -14,3 -12,-5 C-10,-13 -4,-18 0,-16"]
  },
  { id: "blue-morpho", title: "Blue Morpho", location: "Peru", url: "/places/blue-morpho",
    x: 750, y: 630, size: 0.65, filter: "island-texture-3",
    paths: ["M0,-22 C10,-24 20,-12 17,2 C14,14 5,22 -5,20 C-14,16 -20,5 -17,-8 C-14,-18 -6,-24 0,-22"]
  },

  // === Asia/Pacific (far right) ===
  { id: "nuanu", title: "Nuanu", location: "Bali", url: "/places/nuanu",
    x: 1100, y: 500, size: 0.8, filter: "island-texture-2",
    paths: ["M0,-28 C14,-30 25,-15 22,2 C19,18 7,26 -5,24 C-17,20 -25,8 -22,-8 C-18,-22 -8,-30 0,-28"]
  },

  // === Canada (upper right) ===
  { id: "future-thinkers-smart-village", title: "Future Thinkers", location: "Canada", url: "/places/future-thinkers-smart-village",
    x: 720, y: 80, size: 1.1, filter: "island-texture",
    paths: ["M-5,-40 C12,-44 30,-28 35,-10 C38,10 28,30 12,38 C-5,42 -22,30 -30,12 C-35,-5 -28,-28 -18,-38 C-10,-44 -5,-45 -5,-40"]
  },
  { id: "clear-sky-retreat-center", title: "Clear Sky Retreat", location: "Canada", url: "/places/clear-sky-retreat-center",
    x: 660, y: 50, size: 0.65, filter: "island-texture-2",
    paths: ["M0,-22 C10,-24 18,-12 16,2 C13,14 4,20 -5,18 C-14,14 -18,4 -16,-7 C-13,-17 -5,-24 0,-22"]
  },
];

const islandsGroup = document.getElementById('islands');
const tooltip = document.getElementById('tooltip');
const tooltipName = tooltip.querySelector('.place-name');
const tooltipLocation = tooltip.querySelector('.place-location');

// Render each island
places.forEach((place, i) => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'island-group');
  g.setAttribute('transform', `translate(${place.x}, ${place.y}) scale(${place.size})`);
  g.setAttribute('filter', `url(#${place.filter})`);
  g.dataset.id = place.id;

  // Draw island shape
  place.paths.forEach(d => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', '#e8dfd0');
    path.setAttribute('opacity', '0.88');
    g.appendChild(path);
  });

  islandsGroup.appendChild(g);

  // Label (outside the filter group so it's not distorted)
  const labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  labelBg.setAttribute('class', 'island-label-bg');
  labelBg.setAttribute('x', place.x);
  labelBg.setAttribute('y', place.y + 50 * place.size + 14);
  labelBg.textContent = place.title;
  islandsGroup.appendChild(labelBg);

  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.setAttribute('class', 'island-label');
  label.setAttribute('x', place.x);
  label.setAttribute('y', place.y + 50 * place.size + 14);
  label.textContent = place.title;
  islandsGroup.appendChild(label);

  // Interactivity
  g.addEventListener('mouseenter', (e) => {
    tooltipName.textContent = place.title;
    tooltipLocation.textContent = place.location;
    tooltip.classList.add('visible');
  });

  g.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  g.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });

  g.addEventListener('click', () => {
    if (place.url) window.location.href = place.url;
  });
});
</script>

</body>
</html>
